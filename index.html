<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Plan Viewer</title>
  <meta name="description"
    content="View georeferenced raster master plans (Cloud Optimized GeoTIFFs) overlaid on a web basemap.">

  <!-- OpenLayers CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@10.9.0/ol.css">
  <!-- App CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Map container -->
  <div id="map"></div>

  <!-- Control panel (top-left) -->
  <div id="controls">
    <div id="controls-header">
      <button id="menu-toggle" type="button" class="icon-btn" aria-label="Toggle Menu">☰</button>
      <div class="slider-wrapper">
        Opacity&nbsp;
        <label for="opacity-slider" style="display: none;">Overlay Opacity</label>
        <input id="opacity-slider" type="range" min="0" max="1" step="0.01" value="1" title="Overlay Opacity">
      </div>
    </div>

    <div id="menu-content">
      <h2>Varun's Indian Master Plan Viewer</h2>
      <label for="address-search">Search Address</label>
      <div id="search-wrapper">
        <input id="address-search" type="search" placeholder="Search for a place…" autocomplete="off" aria-label="Search address">
        <ul id="search-results" role="listbox" aria-label="Search results"></ul>
      </div>
      <label for="city-select">City</label>
      <select id="city-select">
        <option value="">— Select a city —</option>
      </select>
      <label>Compare</label>
      <button id="swipe-toggle" type="button" class="active">⇔ Swipe On</button>
    </div>
  </div>

  <!-- Bottom Left Controls -->
  <div id="bottom-left-controls">
    <!-- Floating action button for basemap toggle -->
    <button id="basemap-toggle-btn" type="button" class="fab" title="Toggle Basemap">🗺️</button>
    <!-- Floating action button for geolocation -->
    <button id="geolocate-btn" type="button" class="fab" title="My Location">📍</button>
  </div>

  <!-- Vertical swipe divider -->
  <div id="swipe-handle"></div>

  <!-- geotiff.js — required by ol.source.GeoTIFF (not bundled in the OL CDN build) -->
  <script src="https://cdn.jsdelivr.net/npm/geotiff@3.0.5/dist-browser/geotiff.js"></script>
  <!-- OpenLayers JS (full build) -->
  <script src="https://cdn.jsdelivr.net/npm/ol@10.9.0/dist/ol.js"></script>
  <!-- India Boundary Corrector -->
  <script src="https://cdn.jsdelivr.net/npm/@india-boundary-corrector/openlayers-layer/dist/index.global.js"></script>
  <!-- App JS -->
  <script src="main.js"></script>

</body>

</html>
